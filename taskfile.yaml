version: '3'

output: prefixed

dotenv: ['.env.deploy']

tasks:
  db_up:
    dir: 'db'
    cmds:
      - docker compose up -d

  db_down:
    dir: 'db'
    cmds:
      - docker compose down

  client:
    dir: 'client'
    cmds:
      - pnpm run dev
    preconditions:
      - pnpm i

  server:
    dir: 'server'
    cmds:
      - cargo run
    preconditions:
      - sh: cd ../db && sh ./is-running.sh
        msg: Database needs to be running. Run `task db_up`

  server_watch:
    dir: 'server'
    prefix: 'server'
    cmds:
      - cargo watch -x run
    preconditions:
      - sh: cd ../db && sh ./is-running.sh
        msg: Database needs to be running. Run `task db_up`

  run_migrations:
    dir: 'server'
    cmds:
      - cargo run --bin migrate

  run_watch:
    deps: [client, server_watch]

  default:
    deps: [client, server]

  build_client:
    desc: Build the SolidJS frontend
    dir: 'client'
    cmds:
      - pnpm i
      - pnpm run build -- --mode production

  build_server:
    desc: Build the Rust backend for Linux
    dir: 'server'
    cmds:
      - cargo build --release --target x86_64-unknown-linux-gnu --features production

  deploy:
    desc: Build and push artifacts to the VPS
    deps: [build_client, build_server]
    cmds:
      - ssh {{.VPS_USER}}@{{.VPS_IP}} "mkdir -p {{.VPS_DIR}}/client {{.VPS_DIR}}/server"
      - rsync -avz --delete ./client/dist/ {{.VPS_USER}}@{{.VPS_IP}}:{{.VPS_DIR}}/client/
      - rsync -avz ./server/target/x86_64-unknown-linux-gnu/release/server {{.VPS_USER}}@{{.VPS_IP}}:{{.VPS_DIR}}/server/yas
      - ssh {{.VPS_USER}}@{{.VPS_IP}} "chmod +x {{.VPS_DIR}}/server/yas && sudo systemctl restart yas"
      - echo "Deployment complete!"
