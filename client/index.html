<!doctype html>
<html lang="en">
  <head>
    <!-- Pre-load the user to prevent double waterfall -->
    <script>
      const baseURL = "%VITE_API_URL%";
      window._PRELOADED_USER = fetch(`${baseURL}/users/me`, { credentials: 'include', priority: 'high' }).then(r => r.json());
    </script>

    <!-- Pre-load important fonts -->
    <link
      rel="preload"
      href="/fonts/Poppins-Regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    >
    <link
      rel="preload"
      href="/fonts/Poppins-SemiBold.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    >
    <link
      rel="preload"
      href="/fonts/Inter-NumsOnly-Regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    >
    <link
      rel="preload"
      href="/fonts/Inter-NumsOnly-SemiBold.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
