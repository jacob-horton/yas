name: infra

services:
  db:
    image: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: yas
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - 127.0.0.1:5432:5432

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - 127.0.0.1:6379:6379

volumes:
  pgdata:
